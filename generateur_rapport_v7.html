<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rapport Travaux v7</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f4f4f2;color:#222;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}

/* ═══ FORM ═══ */
.fp{width:400px;min-width:340px;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;overflow:hidden}
.fp-head{padding:13px 15px 9px;border-bottom:1px solid #eee}
.fp-head h2{font-size:14px;font-weight:600;color:#111}
.fp-head p{font-size:11px;color:#999;margin-top:1px}
.fp-body{flex:1;overflow-y:auto;padding:11px 13px;display:flex;flex-direction:column;gap:8px}
.fp-body::-webkit-scrollbar{width:3px}
.fp-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.fl label{display:block;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.fl input[type=text],.fl input[type=date]{width:100%;padding:6px 9px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;color:#222;background:#fff;outline:none}
.fl input:focus{border-color:#185FA5}
.sep{font-size:10px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #eee;padding-bottom:4px}

/* step card */
.sc{border:1px solid #e8e8e8;border-radius:8px;padding:9px;background:#fafafa;margin-bottom:6px}
.sc-title{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.st{display:flex;gap:4px;align-items:center}
.st input[type=text]{flex:1;padding:4px 7px;border:1px solid #e0e0e0;border-radius:5px;font-size:12px;color:#222;outline:none;background:#fff}
.st select{padding:4px;border:1px solid #e0e0e0;border-radius:5px;font-size:11px;color:#222;outline:none;background:#fff;cursor:pointer}
.db{background:none;border:1px solid #e0e0e0;border-radius:5px;padding:3px 6px;font-size:11px;color:#999;cursor:pointer;flex-shrink:0}
.db:hover{border-color:#E24B4A;color:#E24B4A}
.ni{width:100%;padding:4px 7px;border:1px solid #e0e0e0;border-radius:5px;font-size:11px;color:#555;outline:none;background:#fff;margin-top:4px}
.pr{display:flex;align-items:center;gap:5px;margin-top:4px}
.pr label{font-size:10px;color:#999;white-space:nowrap}
.pr input[type=number]{width:48px;padding:3px 5px;border:1px solid #e0e0e0;border-radius:5px;font-size:12px;text-align:center;outline:none;font-weight:600;color:#222}

/* subtask */
.stags{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.stag{display:flex;align-items:center;gap:3px;background:#f0f0f0;border-radius:6px;padding:3px 5px;border:1px solid #e8e8e8}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stag-label{flex:1;font-size:10px;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.stag-qty{width:36px;padding:2px 3px;border:1px solid #ddd;border-radius:4px;font-size:10px;text-align:center;color:#185FA5;font-weight:600;background:#fff;outline:none}
.stag-unit{width:30px;padding:2px 3px;border:1px solid #ddd;border-radius:4px;font-size:10px;text-align:center;color:#888;background:#fff;outline:none}
.sub-check{width:13px;height:13px;accent-color:#1D9E75;cursor:pointer;flex-shrink:0}
.pct-inp{width:34px;font-size:10px;border:1px solid #ddd;border-radius:4px;padding:2px 3px;text-align:center;color:#222;font-weight:600;background:#fff;outline:none}
.sp{font-size:9px;color:#999;flex-shrink:0}
.rm{background:none;border:none;cursor:pointer;color:#bbb;padding:0 1px;font-size:11px;flex-shrink:0}
.rm:hover{color:#E24B4A}
.sar{display:flex;gap:4px;margin-top:4px}
.sar input{flex:1;padding:3px 7px;border:1px solid #e0e0e0;border-radius:5px;font-size:11px;outline:none}
.sar button{padding:3px 8px;border:1px solid #e0e0e0;border-radius:5px;font-size:12px;background:#fff;cursor:pointer;color:#555}
.sar button:hover{border-color:#185FA5;color:#185FA5}

/* photo grid in form */
.ph-section{margin-top:7px}
.ph-section-label{font-size:10px;color:#aaa;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.ph-section-label span{color:#888;font-weight:500}
.ph-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.ph-slot{height:48px;border:1.5px dashed #ddd;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#ccc;overflow:hidden;position:relative;background:#f8f8f8;transition:border .15s}
.ph-slot:hover{border-color:#185FA5;background:#f0f6ff}
.ph-slot img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.ph-slot input[type=file]{display:none}
.ph-rm{position:absolute;top:1px;right:1px;background:rgba(255,255,255,.92);border:none;border-radius:50%;width:14px;height:14px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#E24B4A;z-index:2;line-height:1;padding:0}

/* anomaly zone */
.anom-zone{margin-top:7px;border-top:1px dashed #e0e0e0;padding-top:7px}
.anom-label{font-size:10px;font-weight:600;color:#E24B4A;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.anom-ta{width:100%;padding:5px 7px;border:1px solid #f0cece;border-radius:5px;font-size:11px;color:#555;outline:none;background:#fff;resize:vertical;min-height:48px;font-family:inherit}
.anom-ta:focus{border-color:#E24B4A}

.asb{width:100%;padding:7px;border:1.5px dashed #d0d0d0;border-radius:7px;background:none;font-size:12px;color:#888;cursor:pointer;transition:all .15s}
.asb:hover{border-color:#185FA5;color:#185FA5;background:#f0f6ff}
.fp-foot{padding:9px 13px;border-top:1px solid #eee}
.eb{width:100%;padding:9px;background:#185FA5;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
.eb:hover{background:#0C447C}

/* ═══ PREVIEW ═══ */
.pp{flex:1;background:#f0f0ee;display:flex;flex-direction:column;overflow:hidden}
.pp-head{padding:11px 16px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.pp-head h3{font-size:12px;color:#999;font-weight:500}
.pp-head small{font-size:11px;color:#bbb}
.pp-body{flex:1;overflow-y:auto;padding:18px;display:flex;justify-content:center;align-items:flex-start}

/* ═══ REPORT ═══ */
#report{background:#fff;padding:26px 28px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);width:100%;max-width:700px;min-width:360px}
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rt{font-size:20px;font-weight:700;color:#111;line-height:1.25;flex:1;padding-right:12px}
.rdb{text-align:right;flex-shrink:0}
.rdb .rl{font-size:9px;color:#bbb;line-height:1.4}
.rdb .rv{font-size:12px;color:#555;font-weight:600}
.rresp{font-size:12px;color:#888;margin-top:2px}
.rprog{display:flex;align-items:center;gap:10px;margin:10px 0 18px}
.rpb{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden}
.rpbf{height:5px;border-radius:3px;background:#1D9E75}
.rppc{font-size:13px;font-weight:700;color:#1D9E75;white-space:nowrap}

/* timeline */
.rtl{position:relative;padding-left:48px}
.rtl::before{content:'';position:absolute;left:15px;top:14px;bottom:14px;width:1.5px;background:#e8e8e8}
.rstep{position:relative;margin-bottom:12px}
.rcw{position:absolute;left:-44px;width:32px;height:32px}

/* zoom hover */
.rtl .rstep-header .rname{transition:font-size .18s,color .18s,opacity .18s}
.rtl .rstep-header .rnote{transition:font-size .18s,color .18s,opacity .18s}
.rtl.hovering .rstep-header .rname{font-size:11.5px;opacity:.5}
.rtl.hovering .rstep-header .rnote{font-size:9.5px;opacity:.35}
.rtl.hovering .rstep.hov-0 .rstep-header .rname{font-size:15px;opacity:1}
.rtl.hovering .rstep.hov-0 .rstep-header .rnote{font-size:12px;opacity:1}
.rtl.hovering .rstep.hov-1 .rstep-header .rname{font-size:13.5px;opacity:.82}
.rtl.hovering .rstep.hov-1 .rstep-header .rnote{font-size:11px;opacity:.7}
.rtl.hovering .rstep.hov-2 .rstep-header .rname{font-size:12.5px;opacity:.65}
.rtl.hovering .rstep.hov-2 .rstep-header .rnote{font-size:10px;opacity:.55}

.rstep-header{cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:4px}
.rtoggle{font-size:8px;color:#bbb;margin-top:5px;flex-shrink:0;transition:transform .2s;line-height:1;width:10px;display:inline-block}
.rtoggle.open{transform:rotate(90deg)}
.rname{font-size:13.5px;font-weight:700;line-height:1.25;color:#111;flex:1}
.rname.done{color:#1D9E75}.rname.active{color:#185FA5}.rname.pending{color:#bbb;font-weight:400}.rname.blocked{color:#E24B4A}
.rnote{font-size:10.5px;color:#aaa;font-style:italic;margin-top:2px;overflow:hidden;transition:max-height .25s,opacity .2s,margin .2s}
.rnote.show{max-height:40px;opacity:1}
.rnote.hide{max-height:0;opacity:0;margin-top:0}

/* step body */
.rstep-body{overflow:hidden;transition:max-height .3s ease,opacity .25s,margin .25s}
.rstep-body.collapsed{max-height:0!important;opacity:0;margin-top:0}
.rstep-body-inner{display:flex;gap:12px;align-items:flex-start;margin-top:5px}

/* subtasks in preview */
.rsubs{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.rsubr{display:flex;align-items:center;gap:5px}
.rcheck{width:15px;height:15px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}
.ck-done{background:#1D9E75}.ck-prog{background:#185FA5}.ck-zero{background:#E24B4A}
.rsubl{font-size:10.5px;color:#444;flex:1;line-height:1.3;min-width:0}
.qty-tag{font-size:9px;color:#185FA5;font-weight:700;background:#e8f2ff;border-radius:3px;padding:0 3px;margin-left:3px;white-space:nowrap;display:inline}
.rsubbg{width:44px;height:3px;background:#eee;border-radius:2px;overflow:hidden;flex-shrink:0}
.rsubf{height:3px;border-radius:2px}
.rsubp{font-size:9.5px;color:#888;width:26px;text-align:right;flex-shrink:0}

/* photos in preview — 2×2 grid per step */
.r-photos{display:grid;grid-template-columns:repeat(2,100px);grid-template-rows:auto;gap:5px;flex-shrink:0}
.r-photo-item img{width:100px;height:68px;object-fit:cover;border-radius:6px;display:block;border:0.5px solid #eee}
.r-photo-cap{font-size:8px;color:#aaa;text-align:center;margin-top:1px;line-height:1.2;width:100px}

/* anomaly block in preview */
.r-anom{margin-top:8px;border-top:1px solid #fde;padding-top:7px}
.r-anom-title{font-size:11px;font-weight:700;color:#C0392B;margin-bottom:5px}
.r-anom-text{font-size:10.5px;color:#555;line-height:1.5;margin-bottom:7px}
.r-anom-photos{display:grid;grid-template-columns:repeat(2,100px);gap:5px}
.r-anom-photos img{width:100px;height:68px;object-fit:cover;border-radius:6px;display:block;border:0.5px solid #fcc}

.rfoot{margin-top:16px;border-top:1px solid #f0f0f0;padding-top:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px}
.rfootl{font-size:10px;color:#ccc}
.leg{display:flex;gap:8px;flex-wrap:wrap}
.lgi{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.lgd{width:7px;height:7px;border-radius:50%}

/* logos */
.logo-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.logo-slot{width:80px;height:44px;border:1.5px dashed #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:#f8f8f8;transition:border .15s;flex-shrink:0}
.logo-slot:hover{border-color:#185FA5;background:#f0f6ff}
.logo-slot img{width:100%;height:100%;object-fit:contain;display:block}
.logo-slot input[type=file]{display:none}
.logo-slot .ph-rm{position:absolute;top:1px;right:1px;background:rgba(255,255,255,.92);border:none;border-radius:50%;width:14px;height:14px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#E24B4A;z-index:2;line-height:1;padding:0}
.logo-info{flex:1;font-size:10px;color:#aaa}
.logo-info b{display:block;color:#888;font-size:11px}

/* report header with logos */
.rh-logos{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:10px;border-bottom:2px solid #1D9E75}
.rh-logo-left{height:40px;max-width:90px;object-fit:contain;flex-shrink:0}
.rh-logo-right{height:40px;max-width:90px;object-fit:contain;flex-shrink:0}
.rh-center{flex:1;text-align:center}
.rh-center .rt{font-size:18px;font-weight:700;color:#111;line-height:1.25;display:inline}
.rh-right-block{text-align:right;flex-shrink:0;min-width:90px}
.rh-right-block .rl{font-size:9px;color:#bbb;line-height:1.4}
.rh-right-block .rv{font-size:12px;color:#555;font-weight:600}
.rh-right-block .av-total{font-size:13px;font-weight:700;color:#1D9E75;margin-top:4px;white-space:nowrap}
.rh-right-block .av-label{font-size:9px;color:#aaa}
</style>
</head>
<body>
<div class="app">

<!-- ═══ FORM ═══ -->
<div class="fp">
  <div class="fp-head">
    <h2>Générateur de rapport</h2>
    <p>Cliquez sur un titre pour plier/déplier · Survolez pour zoomer</p>
  </div>
  <div class="fp-body">
    <div class="fl"><label>Projet</label><input type="text" id="f-projet" placeholder="Nom du projet" oninput="render()"/></div>
    <div class="fl"><label>Responsable</label><input type="text" id="f-resp" placeholder="Nom du responsable" oninput="render()"/></div>
    <div class="fl"><label>Date</label><input type="date" id="f-date" oninput="render()"/></div>
    <div class="sep">Logos</div>
    <div class="logo-row">
      <div>
        <div style="font-size:10px;color:#888;margin-bottom:3px">Logo gauche (ONCF…)</div>
        <div class="logo-slot" id="logo-left-slot" onclick="document.getElementById('logo-left-inp').click()">
          <input type="file" id="logo-left-inp" accept="image/*" onchange="loadLogo('left',this)" style="display:none"/>
          <span style="font-size:20px;color:#ccc" id="logo-left-plus">+</span>
        </div>
      </div>
      <div>
        <div style="font-size:10px;color:#888;margin-bottom:3px">Logo droit (Entreprise…)</div>
        <div class="logo-slot" id="logo-right-slot" onclick="document.getElementById('logo-right-inp').click()">
          <input type="file" id="logo-right-inp" accept="image/*" onchange="loadLogo('right',this)" style="display:none"/>
          <span style="font-size:20px;color:#ccc" id="logo-right-plus">+</span>
        </div>
      </div>
    </div>
    <div class="sep">Étapes</div>
    <div id="steps-form"></div>
    <button class="asb" onclick="addStep()">+ Ajouter une étape</button>
  </div>
  <div class="fp-foot" style="display:flex;gap:6px">
    <button class="eb" style="background:#1D9E75" onclick="exportPDF()">⬇ PDF</button>
    <button class="eb" onclick="exportImg()">⬇ PNG</button>
  </div>
</div>

<!-- ═══ PREVIEW ═══ -->
<div class="pp">
  <div class="pp-head">
    <h3>Aperçu du rapport</h3>
    <small>Photos et anomalies intégrées par étape</small>
  </div>
  <div class="pp-body"><div id="report"></div></div>
</div>
</div>

<script>
/* ══════════ HELPERS ══════════ */
function fd(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function sc(s){return s==='done'?'#1D9E75':s==='active'?'#185FA5':s==='blocked'?'#E24B4A':'#ccc'}
function dc(p){return p===100?'#1D9E75':p>0?'#185FA5':'#E24B4A'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function mkPhotos(n){var a=[];for(var i=0;i<n;i++)a.push({dataUrl:null,caption:''});return a}

/* logos */
var logos={left:null,right:null};
function loadLogo(side,inp){
  var f=inp.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    logos[side]=ev.target.result;
    var slot=document.getElementById('logo-'+side+'-slot');
    var plus=document.getElementById('logo-'+side+'-plus');
    if(plus)plus.style.display='none';
    // remove old img if any
    var old=slot.querySelector('img');if(old)old.remove();
    var old2=slot.querySelector('.ph-rm');if(old2)old2.remove();
    var img=document.createElement('img');img.src=ev.target.result;slot.appendChild(img);
    var btn=document.createElement('button');btn.className='ph-rm';btn.textContent='✕';
    btn.onclick=function(e){e.stopPropagation();logos[side]=null;img.remove();btn.remove();if(plus)plus.style.display='';render();};
    slot.appendChild(btn);
    render();
  };
  rd.readAsDataURL(f);
}

function circleSVG(pct,status){
  var c=sc(status),r=12,cx=16,cy=16,ci=2*Math.PI*r;
  var dash=(pct/100)*ci,tc=status==='pending'?'#bbb':c,track=status==='pending'?'#eee':'#e4f4ee';
  return '<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#fff" stroke="'+track+'" stroke-width="2.5"/>'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="2.5"'
    +' stroke-dasharray="'+dash.toFixed(2)+' '+ci.toFixed(2)+'"'
    +' stroke-linecap="round" transform="rotate(-90 '+cx+' '+cy+')"/>'
    +'<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central"'
    +' font-size="6.5" font-weight="700" fill="'+tc+'" font-family="Helvetica Neue,Arial,sans-serif">'+pct+'%</text>'
    +'</svg>';
}
function checkHTML(pct){
  if(pct===100)return'<div class="rcheck ck-done">✓</div>';
  if(pct>0)return'<div class="rcheck ck-prog" style="font-size:7px">●</div>';
  return'<div class="rcheck ck-zero" style="font-size:7px">●</div>';
}

/* ══════════ DATA ══════════ */
function mkStep(id,title,status,notes,pct,subs,open){
  return{id:id,title:title,status:status,notes:notes,pct:pct,subs:subs,open:open,
    photos:mkPhotos(4), anomText:'', anomPhotos:mkPhotos(4)};
}

var steps=[
  mkStep(1,'Tournée dans les quais avec les différentes parties prenantes','done','PS, voies, caténaire, signalisation, PV, prestataire',100,[],false),
  mkStep(2,'Consigne locale des travaux','done','signé le 18/04/2026',100,[
    {label:'Démontage de platelage de la voie 13G Le 20/04/2026',pct:100,qty:0,unit:'m²'},
    {label:'Consigne et interdiction des voies 11G et 13G Le 20/04/2026',pct:100,qty:0,unit:'m²'},
    {label:'Consignation et coupure de la caténaire 13G Le 20/04/2026',pct:100,qty:0,unit:'m²'}],false),
  mkStep(3,'Ouverture dans la clôture coté quai1 pour Ravitalement trains-Restaurail','done','Le 20/04/2026',100,[],false),
  mkStep(4,'Dépose des différentes équipements du quai 1','done','Début :20/04/2026',100,[
    {label:'Dépose des horloges',pct:100,qty:0,unit:'u'},
    {label:'Dépose des TDV',pct:100,qty:0,unit:'u'},
    {label:'Dépose des panneaux signalétiques',pct:40,qty:0,unit:'u'},
    {label:'Dépose des bancs',pct:100,qty:0,unit:'u'},
    {label:"Dépose des poteaux d'éclairage",pct:0,qty:0,unit:'u'}],false),
  mkStep(5,'Installation de chantier','active','Début :21/04/2026',1,[
    {label:'Balisage et sécurisation (palissade)',pct:100,qty:0,unit:'ml'},
    {label:'Arrivée des engins',pct:100,qty:0,unit:'u'}],true),
  mkStep(6,'Démolition du revsol et préparation de sol','active','Début le 21/04/2026',1,[
    {label:'Décapage manuel du revsol autour des poteaux et mâts',pct:100,qty:10,unit:'m²'},
    {label:"Décapage par le biais d'un JCB",pct:3,qty:20,unit:'m²'},
    {label:'Évacuation des déchets',pct:0,qty:0,unit:'m³'},
    {label:'Décaissement et nivellement de fond',pct:0,qty:0,unit:'m²'},
    {label:'Compactage',pct:0,qty:0,unit:'m²'}],true),
  mkStep(7,'Coulage de béton','pending','',0,[],false),
  mkStep(8,'Repose des équipements','pending','',0,[],false),
  mkStep(9,'Fin travaux','pending','',0,[],false)
];
var nid=10;

document.getElementById('f-date').value='2026-04-21';
document.getElementById('f-projet').value='Projet de réfection des quais 1 et 2 de la gare Casa Voyageurs';

/* ══════════ PHOTO HANDLERS ══════════ */
function triggerPh(sid,kind,pi){document.getElementById('pf_'+sid+'_'+kind+'_'+pi).click()}
function onPhChange(sid,kind,pi,inp){
  var f=inp.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    var s=steps.find(function(x){return x.id===sid});if(!s)return;
    s[kind][pi].dataUrl=ev.target.result;
    rAll();
  };
  rd.readAsDataURL(f);
}
function clearPh(sid,kind,pi){
  var s=steps.find(function(x){return x.id===sid});if(!s)return;
  s[kind][pi].dataUrl=null;s[kind][pi].caption='';rAll();
}
function updateAnomText(sid,val){
  var s=steps.find(function(x){return x.id===sid});if(s){s.anomText=val;render();}
}

/* ══════════ FORM RENDER ══════════ */
function photoGrid(sid,kind,n){
  var h='<div class="ph-grid">';
  for(var pi=0;pi<n;pi++){
    var s=steps.find(function(x){return x.id===sid});
    var ph=s[kind][pi];
    var hasImg=ph&&ph.dataUrl;
    h+='<div class="ph-slot" onclick="triggerPh('+sid+',\''+kind+'\','+pi+')">'
      +'<input type="file" id="pf_'+sid+'_'+kind+'_'+pi+'" accept="image/*" onchange="onPhChange('+sid+',\''+kind+'\','+pi+',this)" style="display:none"/>'
      +(hasImg
        ?'<img src="'+ph.dataUrl+'"/><button class="ph-rm" onclick="event.stopPropagation();clearPh('+sid+',\''+kind+'\','+pi+')">✕</button>'
        :'<span style="font-size:16px;color:#ccc">+</span>')
      +'</div>';
  }
  h+='</div>';
  return h;
}

function rForm(){
  var html='';
  steps.forEach(function(s,i){
    var subHtml='';
    s.subs.forEach(function(t,ti){
      subHtml+='<div class="stag">'
        +'<div class="sdot" style="background:'+dc(t.pct)+'"></div>'
        +'<span class="stag-label" title="'+esc(t.label)+'">'+esc(t.label)+'</span>'
        +'<input class="stag-qty" type="number" min="0" value="'+t.qty+'"'
        +' oninput="steps['+i+'].subs['+ti+'].qty=Math.max(0,+this.value||0);render()"/>'
        +'<input class="stag-unit" type="text" value="'+esc(t.unit)+'" maxlength="5" placeholder="m²"'
        +' oninput="steps['+i+'].subs['+ti+'].unit=this.value;render()"/>'
        +'<input type="checkbox" class="sub-check"'+(t.pct===100?' checked':'')
        +' onchange="steps['+i+'].subs['+ti+'].pct=this.checked?100:0;rAll()"/>'
        +'<input class="pct-inp" type="number" min="0" max="100" value="'+t.pct+'"'
        +' oninput="steps['+i+'].subs['+ti+'].pct=Math.min(100,Math.max(0,+this.value||0));rAll()"/>'
        +'<span class="sp">%</span>'
        +'<button class="rm" onclick="remSub('+s.id+','+ti+')">✕</button>'
        +'</div>';
    });

    html+='<div class="sc">'
      // header
      +'<div class="st">'
      +'<input type="text" value="'+esc(s.title)+'" placeholder="Titre" oninput="steps['+i+'].title=this.value;render()"/>'
      +'<select onchange="steps['+i+'].status=this.value;if(this.value===\'done\')steps['+i+'].pct=100;if(this.value===\'pending\')steps['+i+'].pct=0;rAll()">'
      +'<option value="pending"'+(s.status==='pending'?' selected':'')+'>En attente</option>'
      +'<option value="active"'+(s.status==='active'?' selected':'')+'>En cours</option>'
      +'<option value="done"'+(s.status==='done'?' selected':'')+'>Terminé</option>'
      +'<option value="blocked"'+(s.status==='blocked'?' selected':'')+'>Bloqué</option>'
      +'</select>'
      +'<button class="db" onclick="remStep('+s.id+')">✕</button>'
      +'</div>'
      +'<input class="ni" type="text" placeholder="Notes / sous-titre" value="'+esc(s.notes)+'" oninput="steps['+i+'].notes=this.value;render()"/>'
      +'<div class="pr"><label>Avancement</label>'
      +'<input type="number" min="0" max="100" value="'+s.pct+'" oninput="steps['+i+'].pct=Math.min(100,Math.max(0,+this.value||0));render()"/>'
      +'<span style="font-size:11px;color:#999">%</span></div>'
      // subtasks
      +'<div class="stags">'+subHtml+'</div>'
      +'<div class="sar"><input type="text" id="si-'+s.id+'" placeholder="Ajouter sous-tâche..."/>'
      +'<button onclick="addSub('+s.id+')">+</button></div>'
      // photos avancement
      +'<div class="ph-section">'
      +'<div class="ph-section-label">📷 <span>Photos avancement</span> (4)</div>'
      +photoGrid(s.id,'photos',4)
      +'</div>'
      // anomalies
      +'<div class="anom-zone">'
      +'<div class="anom-label">⚠️ <span style="color:#E24B4A;font-weight:600">Anomalies</span></div>'
      +'<textarea class="anom-ta" placeholder="Décrire les anomalies constatées..." oninput="updateAnomText('+s.id+',this.value)">'+esc(s.anomText)+'</textarea>'
      +'<div class="ph-section" style="margin-top:5px">'
      +'<div class="ph-section-label">📷 <span>Photos anomalies</span> (4)</div>'
      +photoGrid(s.id,'anomPhotos',4)
      +'</div>'
      +'</div>'
      +'</div>';
  });
  document.getElementById('steps-form').innerHTML=html;
}

function addStep(){
  steps.push(mkStep(nid++,'Nouvelle étape','pending','',0,[],true));
  rAll();
}
function remStep(id){steps=steps.filter(function(s){return s.id!==id});rAll()}
function addSub(id){
  var inp=document.getElementById('si-'+id),v=inp.value.trim();if(!v)return;
  steps.find(function(x){return x.id===id}).subs.push({label:v,pct:0,qty:0,unit:'m²'});inp.value='';rAll();
}
function remSub(id,ti){steps.find(function(x){return x.id===id}).subs.splice(ti,1);rAll()}
function rAll(){rForm();render()}
function toggleStep(id){var s=steps.find(function(x){return x.id===id});if(s){s.open=!s.open;render();}}

/* ══════════ PREVIEW RENDER ══════════ */
function render(){
  var projet=document.getElementById('f-projet').value||'Nom du projet';
  var resp=document.getElementById('f-resp').value||'';
  var date=fd(document.getElementById('f-date').value)||'';
  var done=steps.filter(function(s){return s.status==='done'}).length;
  var gPct=steps.length?Math.round(steps.reduce(function(a,s){return a+s.pct},0)/steps.length):0;

  var h='';
  // header with logos
  h+='<div class="rh-logos">';
  h+=logos.left?'<img class="rh-logo-left" src="'+logos.left+'"/>':'<div style="width:90px;flex-shrink:0"></div>';
  h+='<div class="rh-center"><div class="rt">'+esc(projet)+'</div>'+(resp?'<div style="font-size:11px;color:#888;margin-top:2px">'+esc(resp)+'</div>':'')+'</div>';
  h+='<div class="rh-right-block">';
  h+='<div class="rl">Rapport<br>journalier</div><div class="rv">'+date+'</div>';
  h+='<div class="av-label">Avancement total</div>';
  h+='<div class="av-total">'+gPct+'%</div>';
  h+='</div>';
  h+=logos.right?'<img class="rh-logo-right" src="'+logos.right+'"/>':'<div style="width:90px;flex-shrink:0"></div>';
  h+='</div>';
  // progress bar
  h+='<div class="rprog"><div class="rpb"><div class="rpbf" style="width:'+gPct+'%"></div></div>'
    +'<span class="rppc">'+done+'/'+steps.length+' étapes</span></div>'
    +'<div class="rtl" id="rtl-inner">';

  steps.forEach(function(s){
    var hasSubs=s.subs.length>0;
    var activePh=s.photos.filter(function(p){return p&&p.dataUrl});
    var activeAnomPh=s.anomPhotos.filter(function(p){return p&&p.dataUrl});
    var hasAnom=s.anomText.trim()!==''||activeAnomPh.length>0;
    var hasBody=hasSubs||activePh.length>0||hasAnom;
    var isOpen=s.open;
    var estH=isOpen?(s.subs.length*28+activePh.length*80+activeAnomPh.length*80+200)+'px':'0px';
    var arrow=hasBody?('<span class="rtoggle'+(isOpen?' open':'')+'">▶</span>'):'<span class="rtoggle"></span>';

    h+='<div class="rstep" data-id="'+s.id+'">'
      +'<div class="rcw">'+circleSVG(s.pct,s.status)+'</div>'
      +'<div class="rstep-header"'+(hasBody?' onclick="toggleStep('+s.id+')"':'')+'>'
      +arrow
      +'<div style="flex:1;min-width:0">'
      +'<div class="rname '+s.status+'">'+esc(s.title)+'</div>'
      +(s.notes?'<div class="rnote '+(isOpen?'show':'hide')+'">'+esc(s.notes)+'</div>':'')
      +'</div></div>';

    if(hasBody){
      h+='<div class="rstep-body'+(isOpen?'':' collapsed')+'" style="max-height:'+estH+';">';
      h+='<div class="rstep-body-inner">';

      // subtasks
      if(hasSubs){
        h+='<div class="rsubs">';
        s.subs.forEach(function(t){
          var qTag=(t.qty>0&&t.unit)?'<span class="qty-tag">'+t.qty+esc(t.unit)+'</span>':'';
          h+='<div class="rsubr">'
            +checkHTML(t.pct)
            +'<div class="rsubl">'+esc(t.label)+qTag+'</div>'
            +'<div class="rsubbg"><div class="rsubf" style="width:'+t.pct+'%;background:'+dc(t.pct)+'"></div></div>'
            +'<div class="rsubp">'+t.pct+'%</div>'
            +'</div>';
        });
        h+='</div>';
      }

      // photos avancement — 2×2 grid
      if(activePh.length>0){
        h+='<div class="r-photos">';
        activePh.forEach(function(p){
          h+='<div class="r-photo-item"><img src="'+p.dataUrl+'"/>'
            +(p.caption?'<div class="r-photo-cap">'+esc(p.caption)+'</div>':'')
            +'</div>';
        });
        h+='</div>';
      }

      h+='</div>'; // close inner

      // anomaly block — full width below
      if(hasAnom){
        h+='<div class="r-anom">'
          +'<div class="r-anom-title">⚠ Anomalies</div>'
          +(s.anomText?'<div class="r-anom-text">'+esc(s.anomText).replace(/\n/g,'<br>')+'</div>':'');
        if(activeAnomPh.length>0){
          h+='<div class="r-anom-photos">';
          activeAnomPh.forEach(function(p){
            h+='<img src="'+p.dataUrl+'"/>';
          });
          h+='</div>';
        }
        h+='</div>';
      }

      h+='</div>'; // close rstep-body
    }
    h+='</div>'; // close rstep
  });

  h+='</div>' // close rtl
    +'<div class="rfoot">'
    +'<div class="rfootl">Généré le '+date+(resp?' · '+esc(resp):'')+'</div>'
    +'<div class="leg">'
    +'<div class="lgi"><div class="lgd" style="background:#1D9E75"></div>Terminé</div>'
    +'<div class="lgi"><div class="lgd" style="background:#185FA5"></div>En cours</div>'
    +'<div class="lgi"><div class="lgd" style="background:#E24B4A"></div>Bloqué</div>'
    +'<div class="lgi"><div class="lgd" style="background:#ccc"></div>En attente</div>'
    +'</div></div>';

  document.getElementById('report').innerHTML=h;
  bindHoverZoom();
}

/* ══════════ ZOOM ══════════ */
function bindHoverZoom(){
  var rtl=document.getElementById('rtl-inner');if(!rtl)return;
  var els=rtl.querySelectorAll('.rstep');
  els.forEach(function(el,idx){
    el.addEventListener('mouseenter',function(){
      rtl.classList.add('hovering');
      els.forEach(function(e2,j){
        var d=Math.abs(j-idx);
        e2.classList.remove('hov-0','hov-1','hov-2');
        if(d<=2)e2.classList.add('hov-'+d);
      });
    });
    el.addEventListener('mouseleave',function(){
      rtl.classList.remove('hovering');
      els.forEach(function(e2){e2.classList.remove('hov-0','hov-1','hov-2')});
    });
  });
}

/* ══════════ EXPORT PNG ══════════ */
function exportImg(){
  var orig=steps.map(function(s){return s.open});
  steps.forEach(function(s){s.open=true});
  render();
  setTimeout(function(){
    html2canvas(document.getElementById('report'),{
      scale:3,backgroundColor:'#ffffff',useCORS:true,allowTaint:true,logging:false
    }).then(function(canvas){
      var a=document.createElement('a');
      var p=(document.getElementById('f-projet').value||'rapport').replace(/\s+/g,'_').slice(0,40);
      var d=(document.getElementById('f-date').value||'').replace(/-/g,'');
      a.download='rapport_'+p+'_'+d+'.png';
      a.href=canvas.toDataURL('image/png');
      a.click();
      steps.forEach(function(s,i){s.open=orig[i]});
      render();
    });
  },500);
}

/* ══════════ EXPORT PDF ══════════ */
function exportPDF(){
  var orig=steps.map(function(s){return s.open});
  steps.forEach(function(s){s.open=true});
  render();
  setTimeout(function(){
    var el=document.getElementById('report');
    html2canvas(el,{scale:3,backgroundColor:'#ffffff',useCORS:true,allowTaint:true,logging:false}).then(function(canvas){
      var imgData=canvas.toDataURL('image/png');
      var jspdf=window.jspdf||window.jsPDF;
      var PDF=jspdf?new jspdf.jsPDF('p','mm','a4'):null;
      if(!PDF){alert('jsPDF non chargé, veuillez réessayer.');return;}
      var pageW=PDF.internal.pageSize.getWidth();
      var pageH=PDF.internal.pageSize.getHeight();
      var margin=10;
      var usableW=pageW-2*margin;
      var imgW=canvas.width;
      var imgH=canvas.height;
      var ratio=usableW/imgW;
      var scaledH=imgH*ratio;
      var y=margin;
      /* paginate if content taller than one page */
      if(scaledH<=pageH-2*margin){
        PDF.addImage(imgData,'PNG',margin,y,usableW,scaledH);
      } else {
        var pageContent=pageH-2*margin;
        var totalPages=Math.ceil(scaledH/pageContent);
        for(var pg=0;pg<totalPages;pg++){
          if(pg>0)PDF.addPage();
          var srcY=pg*pageContent/ratio;
          var srcH=Math.min(pageContent/ratio, imgH-srcY);
          var sliceCanvas=document.createElement('canvas');
          sliceCanvas.width=imgW;
          sliceCanvas.height=srcH;
          var ctx=sliceCanvas.getContext('2d');
          ctx.drawImage(canvas,0,srcY,imgW,srcH,0,0,imgW,srcH);
          var sliceData=sliceCanvas.toDataURL('image/png');
          PDF.addImage(sliceData,'PNG',margin,margin,usableW,srcH*ratio);
        }
      }
      var p=(document.getElementById('f-projet').value||'rapport').replace(/\s+/g,'_').slice(0,40);
      var d=(document.getElementById('f-date').value||'').replace(/-/g,'');
      PDF.save('rapport_'+p+'_'+d+'.pdf');
      steps.forEach(function(s,i){s.open=orig[i]});
      render();
    });
  },500);
}

/* ══════════ INIT ══════════ */
rAll();
</script>
